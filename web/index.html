<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>個人的おすすめ漫画紹介</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        header{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            padding:30px;
        }

        .card{
            width:250px;
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        .card-content{
            padding:15px;
            text-align:center;
        }

        .btn{
            display:inline-block;
            padding:10px 15px;
            background:#ff6600;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<header>
    <h1>おすすめ漫画紹介</h1>
    <p>おすすめ漫画を紹介します</p>
</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="ONE PIECE">
        <div class="card-content">
            <h2>ONE PIECE</h2>
            <p>海賊王を目指すルフィの冒険。</p>
            <a href="onepiece.html" class="btn">詳細を見る</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="鬼滅の刃">
        <div class="card-content">
            <h2>鬼滅の刃</h2>
            <p>鬼と戦う剣士たちの物語。</p>
            <a href="kimetsu.html" class="btn">詳細を見る</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="進撃の巨人">
        <div class="card-content">
            <h2>進撃の巨人</h2>
            <p>巨人に立ち向かう人類の戦い。</p>
            <a href="shingeki.html" class="btn">詳細を見る</a>
        </div>
    </div>

</div>

</body>
</html>
